name: release

on:
  push:
    branches: [main]
    tags: ["v*"]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: web
            context: .
            dockerfile: apps/web/Dockerfile
            target: runner
          - name: api
            context: .
            dockerfile: services/api/Dockerfile
            target: runner
          - name: ai
            context: services/ai
            dockerfile: services/ai/Dockerfile
            target: ""
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}-${{ matrix.name }}
          tags: |
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          target: ${{ matrix.target }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=release-${{ matrix.name }}
          cache-to: type=gha,scope=release-${{ matrix.name }},mode=max

  github-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Create GitHub Release with changelog
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" --generate-notes

  # Deploy = point ECS at the new images (terraform outputs drive the names).
  # Gated behind the `prod` environment; skips cleanly until AWS secrets exist.
  deploy:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: Check for AWS credentials
        id: creds
        env:
          AWS_KEY: ${{ secrets.AWS_ACCESS_KEY_ID }}
        run: echo "present=${{ env.AWS_KEY != '' }}" >> "$GITHUB_OUTPUT"
      - name: Roll ECS services to the new images
        if: steps.creds.outputs.present == 'true'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ap-south-1
        run: |
          for svc in web api ai; do
            aws ecs update-service --cluster mulaqat-prod \
              --service "mulaqat-prod-$svc" --force-new-deployment
          done
      - name: Skipped (no AWS credentials configured)
        if: steps.creds.outputs.present != 'true'
        run: echo "AWS secrets not configured — ECS deploy skipped."
